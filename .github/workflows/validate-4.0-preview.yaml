name: Validate ExpressoTS v4 Preview Packages

on:
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package:
          - "@expressots/core@4.0.0-preview.3"
          - "@expressots/adapter-express@4.0.0-preview.3"
          - "@expressots/shared@4.0.0-preview.3"
          - "@expressots/cli@4.0.0-preview.3"
          - "@expressots/studio@4.0.0-preview.3"
          - "@expressots/studio-agent@4.0.0-preview.3"

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify package metadata
        run: |
          npm view "${{ matrix.package }}" name version dist.tarball

      - name: Install package
        run: |
          mkdir package-smoke-test
          cd package-smoke-test
          npm init -y
          npm install --no-audit --no-fund --ignore-scripts "${{ matrix.package }}"
          npm ls --depth=0
